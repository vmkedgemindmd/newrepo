services:
  - type: web
    name: tomatoai-backend
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_HF_API
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
